name: Quality Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONIOENCODING: utf-8
  # Run Qt against a real (virtual) X display via Xvfb. pyqtgraph's
  # PlotWidget.paintEvent segfaults under the "offscreen" QPA on CI's Mesa, so
  # we use xcb + xvfb instead. (tests/gui/conftest.py defaults to "offscreen"
  # for local headless runs; this env overrides it on CI.)
  QT_QPA_PLATFORM: xcb

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      # PySide6 links against EGL/GL/xkbcommon even under the offscreen
      # platform; ubuntu-latest does not ship these by default.
      - name: Install Qt system libraries + Xvfb (PySide6 headless)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 libgl1 libxkbcommon0 libdbus-1-3 xvfb

      - uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Verify uv lock is in sync
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: xvfb-run -a uv run pytest

      - name: Lint
        run: uv run ruff check

      - name: Format check
        run: uv run ruff format --check

      - name: Type check
        run: uv run mypy src/
